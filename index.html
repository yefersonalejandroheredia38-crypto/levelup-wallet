<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUp: Market Intel v20 🛡️🕵️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #010103; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(25px); border-radius: 22px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select, textarea { 
            background: rgba(15, 15, 25, 0.9) !important; 
            border: 1px solid #2d2d3f !important; 
            color: #fff !important; padding: 15px; border-radius: 16px; font-size: 12px; width: 100%;
        }
        .btn-action { 
            background: linear-gradient(135deg, #2563eb, #7c3aed); 
            padding: 16px; border-radius: 18px; font-weight: 800; text-transform: uppercase; font-size: 10px;
        }
        .spy-card { border-left: 4px solid #06b6d4; background: rgba(6, 182, 212, 0.05); }
    </style>
</head>
<body class="p-4 pb-40">

    <header class="glass p-6 mb-4 border-b border-blue-500/30">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[7px] text-blue-400 font-bold tracking-[4px] uppercase mb-1">Caja Chica</p>
                <p class="text-3xl font-bold text-white">$<span id="oro-total">0.00</span></p>
                <p class="text-[8px] text-red-400 font-bold uppercase mt-1">En la Calle: <span id="total-deuda">$0.00</span></p>
            </div>
            <div class="text-right">
                <span class="bg-orange-600/20 text-orange-400 px-3 py-1 rounded-full text-[10px] font-bold">🔥 <span id="streak-val">1</span></span>
                <p class="text-[9px] text-cyan-400 mt-2 font-bold italic">MODO ESPÍA ACTIVO 🕵️</p>
            </div>
        </div>
    </header>

    <nav class="grid grid-cols-4 gap-2 mb-6">
        <button onclick="tab('misiones')" class="glass p-3 text-[7px] font-bold uppercase">Órdenes</button>
        <button onclick="tab('espia')" class="glass p-3 text-[7px] font-bold uppercase text-cyan-400 border border-cyan-500/30">ESPÍA</button>
        <button onclick="tab('boveda')" class="glass p-3 text-[7px] font-bold uppercase text-yellow-400">Bóveda</button>
        <button onclick="tab('oracle')" class="glass p-3 text-[7px] font-bold uppercase text-indigo-400">IA PRO</button>
        <button onclick="tab('inventario')" class="glass p-3 text-[7px] font-bold uppercase text-blue-400">Stock</button>
        <button onclick="tab('clientes')" class="glass p-3 text-[7px] font-bold uppercase text-pink-400">Clientes</button>
        <button onclick="tab('more')" class="glass p-3 text-[7px] font-bold uppercase text-orange-400">Alarma</button>
        <button onclick="tab('calc')" class="glass p-3 text-[7px] font-bold uppercase text-green-400">Cotizar</button>
    </nav>

    <div id="tab-espia" class="tab-content">
        <div class="glass p-5 mb-6">
            <p class="text-cyan-400 font-bold text-[9px] uppercase mb-4 text-center tracking-widest">Inteligencia de Competencia</p>
            <div class="space-y-3">
                <input id="spy-name" type="text" placeholder="Nombre del Competidor / Tienda">
                <div class="grid grid-cols-2 gap-2">
                    <input id="spy-product" type="text" placeholder="Producto Estrella">
                    <input id="spy-price" type="number" placeholder="Su Precio $">
                </div>
                <textarea id="spy-weak" rows="2" placeholder="¿Qué le falta a él? (Su debilidad)"></textarea>
                <textarea id="spy-strong" rows="2" placeholder="¿En qué es mejor que yo?"></textarea>
                <button onclick="addSpy()" class="btn-action bg-cyan-900 w-full">REGISTRAR EN BASE DE DATOS</button>
            </div>
        </div>
        <div id="lista-espia" class="space-y-3 mb-6"></div>
    </div>

    <div id="tab-misiones" class="tab-content active-tab">
        <div id="lista-misiones" class="space-y-3 mb-6"></div>
        <div id="lista-deudas" class="space-y-3 mb-6"></div>
        <div class="glass p-5">
            <input id="new-mision" type="text" placeholder="Nuevo pedido..." class="mb-3">
            <button onclick="addMision()" class="btn-action w-full">REGISTRAR TRABAJO</button>
        </div>
    </div>

    <div id="tab-oracle" class="tab-content">
        <div class="glass p-6">
            <p class="text-indigo-400 font-bold text-[10px] uppercase mb-3 text-center">Consultoría de Estrategia</p>
            <textarea id="ai-query" rows="12" placeholder="Pregúntame cómo ganarle a la competencia registrada..."></textarea>
            <button onclick="askAI()" class="btn-action bg-indigo-800 w-full mt-4">ANALIZAR MERCADO</button>
            <div id="ai-response" class="mt-6 p-4 bg-black/40 rounded-2xl text-[11px] leading-relaxed text-indigo-100 italic"></div>
        </div>
    </div>

    <div id="tab-boveda" class="tab-content">
        <div class="glass p-5 mb-6 border-t-4 border-indigo-500">
            <input id="eq-fijos" type="number" placeholder="Gastos Fijos $">
            <input id="eq-costo" type="number" placeholder="Costo Unitario $">
            <input id="eq-precio" type="number" placeholder="Precio Venta $">
            <button onclick="calcEquilibrio()" class="btn-action bg-indigo-800 w-full py-2 mt-2">CALCULAR PUNTO EQUILIBRIO</button>
            <div id="res-equilibrio" class="hidden mt-3 p-3 bg-white/5 rounded-xl text-[10px]"></div>
        </div>
        <div id="lista-logs" class="space-y-2 mb-6"></div>
    </div>

    <div id="tab-inventario" class="tab-content">...</div>
    <div id="tab-clientes" class="tab-content">...</div>
    <div id="tab-more" class="tab-content">...</div>
    <div id="tab-calc" class="tab-content">...</div>

    <script>
        let data = JSON.parse(localStorage.getItem('biz-v20')) || {
            oro: 0, misiones: [], deudas: [], espia: [], logs: [], inventario: [], clientes: [], alarmas: [], streak: 1
        };

        window.onload = () => { updateUI(); renderSpy(); renderStock(); renderLogs(); renderClients(); renderAlarms(); };

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            const target = document.getElementById('tab-' + t);
            if(target) target.classList.add('active-tab');
        }

        function save() { localStorage.setItem('biz-v20', JSON.stringify(data)); }

        // --- MODO ESPÍA ---
        function addSpy() {
            const n = document.getElementById('spy-name').value;
            const p = document.getElementById('spy-product').value;
            const pr = document.getElementById('spy-price').value;
            const w = document.getElementById('spy-weak').value;
            const s = document.getElementById('spy-strong').value;

            if(!n || !pr) return;
            data.espia.push({ id: Date.now(), n, p, pr, w, s });
            save(); renderSpy();
            // Limpiar campos
            document.getElementById('spy-name').value = ""; document.getElementById('spy-price').value = "";
        }

        function renderSpy() {
            document.getElementById('lista-espia').innerHTML = data.espia.map(s => `
                <div class="glass p-4 spy-card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-cyan-400 uppercase">${s.n}</span>
                        <span class="text-xs font-bold">$${s.pr}</span>
                    </div>
                    <p class="text-[8px] text-gray-400 mb-1">Producto: ${s.p}</p>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <div class="bg-red-500/10 p-2 rounded-lg text-[7px] border border-red-500/20">
                            <p class="font-bold text-red-400">DEBILIDAD:</p> ${s.w}
                        </div>
                        <div class="bg-green-500/10 p-2 rounded-lg text-[7px] border border-green-500/20">
                            <p class="font-bold text-green-400">SU FUERTE:</p> ${s.s}
                        </div>
                    </div>
                    <button onclick="data.espia=data.espia.filter(x=>x.id!==${s.id});save();renderSpy();" class="mt-2 text-[7px] text-gray-600 uppercase">Eliminar Registro</button>
                </div>
            `).join('');
        }

        // --- FUNCIONES CONSERVADAS (UI CORE) ---
        function updateUI() {
            document.getElementById('oro-total').innerText = data.oro.toFixed(2);
            const totalDeuda = data.deudas.reduce((a, b) => a + b.monto, 0);
            document.getElementById('total-deuda').innerText = "$" + totalDeuda.toFixed(2);
            renderMisiones(); renderDeudas();
        }

        function askAI() {
            const q = document.getElementById('ai-query').value;
            const res = document.getElementById('ai-response');
            const comp = data.espia[0] ? `Tu rival '${data.espia[0].n}' vende a $${data.espia[0].pr}` : "No hay competencia registrada";
            
            res.innerText = "IA: Analizando tu posición frente a la competencia...";
            setTimeout(() => {
                res.innerText = `IA: Informe Estratégico Valencia. ${comp}. Si quieres ganarle, aprovecha que su debilidad es '${data.espia[0]?.w || 'desconocida'}' y refuerza tu marca Backflip con una oferta de lanzamiento que no puedan ignorar.`;
            }, 1800);
        }

        function addMision() {
            const v = document.getElementById('new-mision').value; if(!v) return;
            data.misiones.push({id: Date.now(), texto: v});
            document.getElementById('new-mision').value = ""; save(); updateUI();
        }

        function renderMisiones() {
            document.getElementById('lista-misiones').innerHTML = data.misiones.map(m => `
                <div class="glass p-4 flex justify-between items-center border-l-4 border-blue-500">
                    <span class="text-[10px] font-bold uppercase">${m.texto}</span>
                    <button onclick="pasarADeuda(${m.id})" class="bg-red-700 p-2 rounded-xl text-[8px] font-bold">DEUDA</button>
                </div>
            `).join('');
        }

        function pasarADeuda(id) {
            const orden = data.misiones.find(x => x.id === id);
            const monto = parseFloat(prompt("¿Monto por cobrar? $"));
            if(isNaN(monto)) return;
            data.deudas.push({ id: Date.now(), texto: orden.texto, monto: monto, fecha: new Date().toISOString().split('T')[0] });
            data.misiones = data.misiones.filter(x => x.id !== id);
            save(); updateUI();
        }

        function renderDeudas() {
            document.getElementById('lista-deudas').innerHTML = data.deudas.map(d => `
                <div class="glass p-4 border-l-4 border-red-500">
                    <div class="flex justify-between">
                        <span class="text-[9px] font-bold text-red-400 uppercase">${d.texto}</span>
                        <span class="font-bold">$${d.monto}</span>
                    </div>
                    <button onclick="liquidar(${d.id})" class="mt-2 bg-white text-black text-[8px] px-2 py-1 rounded font-bold">PAGADO</button>
                </div>
            `).join('');
        }

        function liquidar(id) {
            const d = data.deudas.find(x => x.id === id);
            data.oro += d.monto;
            data.deudas = data.deudas.filter(x => x.id !== id);
            save(); updateUI();
        }

        // Mantener el resto de funciones de versiones anteriores (save, logs, stock, etc.)
        function renderStock() { /* ... similar a v19 ... */ }
        function renderLogs() { /* ... similar a v19 ... */ }
        function renderClients() { /* ... similar a v19 ... */ }
        function renderAlarms() { /* ... similar a v19 ... */ }
    </script>
</body>
</html>
