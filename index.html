<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUp: Boss Debt Control v26 🛡️⚖️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #010103; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 24px; transition: 0.3s; }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
        
        input { background: rgba(20, 20, 35, 0.8) !important; border: 1px solid #3b82f644 !important; color: #fff !important; padding: 14px; border-radius: 16px; font-size: 11px; width: 100%; }
        .btn-calc { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 14px; font-weight: bold; }
        .btn-action { background: linear-gradient(135deg, #1e40af, #7e22ce); padding: 18px; border-radius: 20px; font-weight: 800; text-transform: uppercase; font-size: 10px; }
        .ia-box { background: linear-gradient(90deg, rgba(30, 64, 175, 0.2), rgba(126, 34, 206, 0.2)); border: 1px dashed #7e22ce; padding: 15px; border-radius: 20px; }
    </style>
</head>
<body class="p-4 pb-44">

    <div class="ia-box mb-6">
        <div class="flex items-center gap-3 mb-2">
            <span class="text-xl">🧠</span>
            <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest italic">Asistente de Estrategia</p>
        </div>
        <p id="ia-consejo" class="text-[10px] text-gray-200 leading-relaxed italic">"Cargando análisis de tu negocio, Jefe..."</p>
    </div>

    <header class="glass p-6 mb-4 border-b-2 border-indigo-600/50">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <p class="text-[7px] text-indigo-400 font-bold uppercase italic">Facturación Real</p>
                <p class="text-3xl font-bold text-white">$<span id="ganancia-total">0.00</span></p>
            </div>
            <div class="text-right">
                <p class="text-[7px] text-red-500 font-bold uppercase italic">Cuentas por Cobrar</p>
                <p class="text-3xl font-bold text-red-400">$<span id="total-deuda">0.00</span></p>
            </div>
        </div>
        <div class="progress-bar h-2 bg-white/10 rounded-full overflow-hidden">
            <div id="meta-fill" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
        </div>
    </header>

    <nav class="grid grid-cols-4 gap-2 mb-6 text-center">
        <button onclick="tab('misiones')" class="glass p-3 text-[7px] font-bold uppercase text-white italic">📋 Trabajos</button>
        <button onclick="tab('cobranza')" class="glass p-3 text-[7px] font-bold uppercase text-red-400 italic">⚖️ Cobranza</button>
        <button onclick="tab('calc')" class="glass p-3 text-[7px] font-bold uppercase text-green-400 italic">📊 Cotizar</button>
        <button onclick="tab('boveda')" class="glass p-3 text-[7px] font-bold uppercase text-yellow-400 italic">💰 Bóveda</button>
        <button onclick="tab('meta')" class="glass p-3 text-[7px] font-bold uppercase text-blue-400">🎯 Metas</button>
        <button onclick="tab('espia')" class="glass p-3 text-[7px] font-bold uppercase text-cyan-400">🕵️ Espía</button>
        <button onclick="tab('clientes')" class="glass p-3 text-[7px] font-bold uppercase text-pink-400">👥 Agenda</button>
        <button onclick="tab('more')" class="glass p-3 text-[7px] font-bold uppercase text-orange-400">⏰ Alarmas</button>
    </nav>

    <div id="tab-cobranza" class="tab-content">
        <div class="flex justify-between items-center mb-4 px-2">
            <p class="text-[10px] font-bold text-red-400 uppercase tracking-tighter italic">Lista de Deudores ⚠️</p>
            <button onclick="addDeudorManual()" class="bg-red-900/40 text-red-400 text-[8px] px-3 py-1 rounded-full border border-red-500/30">+ Deuda</button>
        </div>
        <div id="lista-cobranza" class="space-y-3 mb-6"></div>
    </div>

    <div id="tab-calc" class="tab-content">
        <div class="glass p-5 mb-4 border-green-500/20 text-center">
            <p id="calc-display" class="text-3xl font-bold text-green-400 mb-4">$0.00</p>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <input id="calc-costo" type="number" placeholder="Costo Material $">
                <input id="calc-margen" type="number" placeholder="Ganancia %">
            </div>
            
            <div class="grid grid-cols-4 gap-2 mb-4">
                <button onclick="addNum('7')" class="btn-calc">7</button><button onclick="addNum('8')" class="btn-calc">8</button><button onclick="addNum('9')" class="btn-calc">9</button><button onclick="clearCalc()" class="btn-calc text-red-500">C</button>
                <button onclick="addNum('4')" class="btn-calc">4</button><button onclick="addNum('5')" class="btn-calc">5</button><button onclick="addNum('6')" class="btn-calc">6</button><button onclick="addOp('*')" class="btn-calc text-blue-400">×</button>
                <button onclick="addNum('1')" class="btn-calc">1</button><button onclick="addNum('2')" class="btn-calc">2</button><button onclick="addNum('3')" class="btn-calc">3</button><button onclick="addOp('-')" class="btn-calc text-blue-400">-</button>
                <button onclick="addNum('0')" class="btn-calc">0</button><button onclick="addNum('.')" class="btn-calc">.</button><button onclick="exeCalc()" class="btn-calc bg-green-600/20 col-span-2 text-white font-bold">=</button>
            </div>
            
            <button onclick="generarCotizacion()" class="btn-action w-full bg-green-700">Calcular Precio Final 🚀</button>
            
            <div id="help-calc" class="mt-4 p-3 bg-white/5 rounded-xl text-[8px] text-gray-400 text-left">
                💡 <b>Costo Operativo:</b> Todo lo que gastas para que el producto exista.<br>
                📈 <b>Margen %:</b> Es tu beneficio neto, el valor de tu trabajo.
            </div>
        </div>
    </div>

    <div id="tab-misiones" class="tab-content active-tab">
        <div id="lista-misiones" class="space-y-3 mb-6"></div>
        <div class="glass p-5">
            <input id="new-mision" type="text" placeholder="Ej: Pedido 20 Gorras - Randy" class="mb-3">
            <button onclick="addMision()" class="btn-action w-full">Crear Nueva Orden 🛠️</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('biz-v26')) || {
            oro: 0, ganancia: 0, gasto: 0, meta: 1000,
            misiones: [], deudas: [], logs: []
        };

        window.onload = () => { updateUI(); renderMisiones(); renderDeudas(); runIA(); };

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
        }

        function save() { localStorage.setItem('biz-v26', JSON.stringify(data)); }

        // LÓGICA DE IA RECORDATORIA
        function runIA() {
            const ia = document.getElementById('ia-consejo');
            const totalDeuda = data.deudas.reduce((a,b)=>a+b.monto,0);
            
            if(data.deudas.length > 0) {
                const principal = data.deudas[0];
                ia.innerText = `⚠️ Jefe, tienes $${totalDeuda} en la calle. Especialmente ${principal.cliente} que debe $${principal.monto}. ¡Toca cobrar para subir ese capital!`;
                ia.classList.add('text-red-300');
            } else {
                ia.innerText = "✅ Todo al día, Jefe. No hay deudas pendientes. Es un buen momento para reinvertir o buscar nuevos clientes.";
                ia.classList.remove('text-red-300');
            }
        }

        // CALCULADORA
        let currentExp = "";
        function addNum(n) { currentExp += n; updateCalcDisplay(); }
        function addOp(op) { currentExp += " " + op + " "; updateCalcDisplay(); }
        function clearCalc() { currentExp = ""; updateCalcDisplay(); }
        function updateCalcDisplay() { document.getElementById('calc-display').innerText = currentExp || "$0.00"; }
        function exeCalc() { try { let res = eval(currentExp); currentExp = res.toString(); updateCalcDisplay(); } catch(e) { currentExp = "ERROR"; updateCalcDisplay(); } }
        function generarCotizacion() {
            const c = parseFloat(document.getElementById('calc-costo').value);
            const m = parseFloat(document.getElementById('calc-margen').value);
            if(isNaN(c) || isNaN(m)) return;
            const res = c + (c * (m/100));
            document.getElementById('calc-display').innerText = "VENTA: $" + res.toFixed(2);
        }

        // COBRANZA
        function addDeudorManual() {
            const cli = prompt("¿Quién debe?"); if(!cli) return;
            const mon = parseFloat(prompt("¿Cuánto debe? $")); if(isNaN(mon)) return;
            data.deudas.push({id: Date.now(), cliente: cli, monto: mon, original: mon});
            save(); updateUI(); renderDeudas(); runIA();
        }

        function renderDeudas() {
            document.getElementById('lista-cobranza').innerHTML = data.deudas.map(d => `
                <div class="glass p-4 border-l-4 border-red-500 mb-2">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-white uppercase italic">${d.cliente}</span>
                        <span class="text-red-400 font-extrabold text-sm">$${d.monto}</span>
                    </div>
                    <div class="flex gap-2 mt-3">
                        <button onclick="abonarDeuda(${d.id})" class="bg-white/10 border border-white/20 text-[7px] px-3 py-1 rounded-lg font-bold">ABONAR</button>
                        <button onclick="liquidarDeuda(${d.id})" class="bg-green-600 text-white text-[7px] px-3 py-1 rounded-lg font-bold">CERRAR ✅</button>
                    </div>
                </div>
            `).join('');
        }

        function abonarDeuda(id) {
            const abono = parseFloat(prompt("¿Monto del abono? $"));
            if(isNaN(abono)) return;
            const d = data.deudas.find(x=>x.id===id);
            d.monto -= abono;
            data.ganancia += abono;
            if(d.monto <= 0) data.deudas = data.deudas.filter(x=>x.id!==id);
            save(); updateUI(); renderDeudas(); runIA();
        }

        function liquidarDeuda(id) {
            const d = data.deudas.find(x=>x.id===id);
            data.ganancia += d.monto;
            data.deudas = data.deudas.filter(x=>x.id!==id);
            save(); updateUI(); renderDeudas(); runIA();
        }

        // UI CORE
        function updateUI() {
            document.getElementById('ganancia-total').innerText = data.ganancia.toFixed(2);
            const totalDeuda = data.deudas.reduce((a,b)=>a+b.monto,0);
            document.getElementById('total-deuda').innerText = totalDeuda.toFixed(2);
            const percent = (data.ganancia / data.meta) * 100;
            document.getElementById('meta-fill').style.width = (percent > 100 ? 100 : percent) + "%";
        }

        function addMision() {
            const v = document.getElementById('new-mision').value; if(!v) return;
            data.misiones.push({id: Date.now(), texto: v});
            document.getElementById('new-mision').value = ""; save(); renderMisiones();
        }

        function renderMisiones() {
            document.getElementById('lista-misiones').innerHTML = data.misiones.map(m => `
                <div class="glass p-4 flex justify-between items-center border-l-4 border-indigo-500 mb-2">
                    <span class="text-[10px] font-bold uppercase">${m.texto}</span>
                    <button onclick="pasarACobranza(${m.id})" class="bg-red-700 p-2 rounded-xl text-[7px] font-black italic">FINALIZAR ⚠️</button>
                </div>
            `).join('');
        }

        function pasarACobranza(id) {
            const cli = prompt("Nombre del cliente:"); if(!cli) return;
            const mon = parseFloat(prompt("Total a cobrar: $")); if(isNaN(mon)) return;
            data.deudas.push({id: Date.now(), cliente: cli, monto: mon, original: mon});
            data.misiones = data.misiones.filter(x=>x.id!==id);
            save(); updateUI(); renderMisiones(); renderDeudas(); runIA();
        }
    </script>
</body>
</html>
