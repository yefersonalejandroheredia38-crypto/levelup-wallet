<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUp Quest 🎮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Orbitron', sans-serif; }
        .neon-border { box-shadow: 0 0 15px #3b82f6; }
        .card-mission { background: rgba(31, 41, 55, 0.8); border: 1px solid #374151; }
        .lvl-badge { background: linear-gradient(45deg, #f59e0b, #ef4444); }
    </style>
</head>
<body class="bg-black text-gray-100 min-h-screen">

    <div id="setup" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="text-6xl mb-4">🛡️</div>
        <h1 class="text-4xl font-bold text-blue-500 mb-2 tracking-widest">LEVEL UP</h1>
        <p class="text-gray-400 mb-8 text-sm">CONVIERTE TU VIDA EN UNA AVENTURA 🕹️</p>
        
        <div class="w-full max-w-sm space-y-4">
            <label class="block text-left text-xs text-blue-400 uppercase tracking-widest">Elige tu Avatar:</label>
            <select id="role" class="w-full p-4 bg-gray-900 border border-blue-900 rounded-lg focus:outline-none focus:border-blue-500 text-lg">
                <option value="Comandante 👑">👑 Comandante (Jefe)</option>
                <option value="Guerrero ⚔️">⚔️ Guerrero (Trabajador)</option>
                <option value="Erudito 📚">📚 Erudito (Estudiante)</option>
            </select>
            <button onclick="iniciarApp()" class="w-full bg-blue-600 hover:bg-blue-400 p-4 rounded-xl font-bold transition-all duration-300 neon-border text-xl">
                ¡INICIAR PARTIDA! 🚀
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 pb-32">
        <header class="flex justify-between items-center mb-6 bg-gray-900 p-5 rounded-2xl border-b-4 border-blue-600">
            <div>
                <h2 id="user-role" class="text-blue-400 text-xs font-bold uppercase tracking-widest">Avatar</h2>
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-bold font-mono">Nivel <span id="lvl">1</span></span>
                    <span class="lvl-badge text-[10px] px-2 py-1 rounded-full text-white font-bold">PRO</span>
                </div>
            </div>
            <div class="text-right">
                <p class="text-xs text-yellow-500 font-bold uppercase tracking-widest text-right">Tesoro 💰</p>
                <p class="text-2xl font-bold font-mono text-green-400">$<span id="balance">150.00</span></p>
            </div>
        </header>

        <div class="mb-8">
            <div class="flex justify-between text-[10px] mb-2 px-1 font-bold">
                <span>EXPERIENCIA (XP) ✨</span>
                <span id="xp-text">0/100</span>
            </div>
            <div class="w-full bg-gray-800 rounded-full h-4 overflow-hidden border-2 border-gray-700">
                <div id="xp-bar" class="bg-gradient-to-r from-blue-600 to-cyan-400 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <section class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-xl">🔥</span>
                <h3 class="text-sm font-bold text-blue-300 tracking-widest uppercase">Misiones del Día</h3>
            </div>
            
            <div id="lista-misiones" class="space-y-4">
                <div class="card-mission p-4 rounded-2xl border-l-4 border-green-500 flex justify-between items-center shadow-lg">
                    <div>
                        <p class="text-sm font-bold">💪 Entrenamiento</p>
                        <p class="text-[10px] text-gray-400">Gana +20 XP | +5 💰</p>
                    </div>
                    <button onclick="completarMision(this, 20, 5)" class="px-4 py-2 bg-green-600 text-white rounded-xl text-xs font-bold shadow-md active:scale-90 transition-transform">LOGRADO</button>
                </div>

                <div class="card-mission p-4 rounded-2xl border-l-4 border-purple-500 flex justify-between items-center shadow-lg">
                    <div>
                        <p class="text-sm font-bold">✍️ Encargos / Tarea</p>
                        <p class="text-[10px] text-gray-400">Gana +30 XP | +10 💰</p>
                    </div>
                    <button onclick="completarMision(this, 30, 10)" class="px-4 py-2 bg-purple-600 text-white rounded-xl text-xs font-bold shadow-md active:scale-90 transition-transform">HECHO</button>
                </div>
            </div>
        </section>

        <div class="fixed bottom-6 left-0 w-full px-6 space-y-3">
             <button onclick="alert('⚡ ¡IA Analizando tus deudas! Próximamente...')" class="w-full bg-blue-900/40 border border-blue-500 p-4 rounded-2xl flex items-center justify-center gap-2 font-bold text-blue-300 shadow-xl">
                <span>🤖</span> HABLAR CON EL MENTOR IA
            </button>
            <button onclick="alert('🔴 Reduciendo Vida... ¡Cuidado con los gastos!')" class="w-full bg-red-900/60 border border-red-500 p-4 rounded-2xl flex items-center justify-center gap-2 font-bold shadow-xl">
                <span>💸</span> REGISTRAR GASTO (-HP)
            </button>
        </div>
    </div>

    <script>
        let xp = 0;
        let nivel = 1;
        let balance = 150.00;

        function iniciarApp() {
            const role = document.getElementById('role').value;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-role').innerText = role;
        }

        function completarMision(btn, puntosXP, puntosOro) {
            btn.parentElement.classList.add('opacity-40', 'grayscale');
            btn.disabled = true;
            btn.innerText = "✅";

            xp += puntosXP;
            balance += puntosOro;
            
            document.getElementById('balance').innerText = balance.toFixed(2);
            actualizarXP();
        }

        function actualizarXP() {
            if (xp >= 100) {
                xp = xp - 100;
                nivel++;
                document.getElementById('lvl').innerText = nivel;
                alert("🎊 ¡LEVEL UP! 🎊\nHas subido al nivel " + nivel + ". ¡Sigue así, Héroe!");
            }
            document.getElementById('xp-bar').style.width = xp + "%";
            document.getElementById('xp-text').innerText = xp + "/100";
        }
    </script>
</body>
</html>
