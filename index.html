<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LevelUp Ultra Notifier 🎮</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Orbitron', sans-serif; background: #050505; color: #e5e7eb; }
        .neon-blue { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); border: 1px solid #3b82f6; }
        .card-mission { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); }
        .btn-glow:active { transform: scale(0.95); box-shadow: 0 0 20px #3b82f6; }
    </style>
</head>
<body class="pb-20">

    <div id="setup" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="text-7xl mb-6">🛡️</div>
        <h1 class="text-4xl font-bold text-blue-500 tracking-tighter mb-2">LEVEL UP</h1>
        <p class="text-gray-500 text-[10px] tracking-[0.4em] mb-10">SISTEMA DE NOTIFICACIONES ACTIVADO</p>
        <button onclick="solicitarPermisosYEmpezar()" class="w-full max-w-xs bg-blue-600 p-5 rounded-2xl font-bold neon-blue text-xl btn-glow">
            INICIAR AVENTURA 🚀
        </button>
    </div>

    <div id="dashboard" class="hidden p-4 animate-fadeIn">
        <header class="flex justify-between items-start mb-6 bg-gray-900/80 p-5 rounded-3xl border-b-2 border-blue-500 shadow-xl">
            <div>
                <p id="user-role" class="text-blue-400 text-[9px] font-bold tracking-widest mb-1">AVATAR</p>
                <p class="text-2xl font-bold italic">Lvl <span id="lvl">1</span></p>
                <p class="text-[9px] text-orange-400 mt-1">🔥 RACHA: <span id="racha">0</span> DÍAS</p>
            </div>
            <div class="text-right">
                <p class="text-yellow-500 text-[9px] font-bold tracking-widest">TESORO 💰</p>
                <p class="text-3xl font-bold text-green-400 font-mono">$<span id="balance">0.00</span></p>
            </div>
        </header>

        <div class="bg-gray-900/40 p-4 rounded-3xl mb-6 border border-gray-800">
            <canvas id="graficaAhorro" height="120"></canvas>
        </div>

        <section class="mb-8">
            <div class="flex gap-2 bg-gray-900 p-2 rounded-2xl border border-gray-700">
                <input id="nueva-tarea" type="text" placeholder="Nueva misión... 💪" class="flex-1 bg-transparent p-3 text-sm outline-none">
                <button onclick="agregarMision()" class="bg-blue-600 w-12 h-12 rounded-xl font-bold text-2xl">+</button>
            </div>
        </section>

        <div id="lista-misiones" class="space-y-4"></div>

        <button onclick="enviarNotificacion('🔔 Recordatorio', '¡No olvides completar tus tareas para subir de nivel!')" class="mt-10 w-full text-[10px] text-blue-500/50 uppercase tracking-widest">
            Probar Notificación 📲
        </button>
    </div>

    <script>
        let xp = parseInt(localStorage.getItem('xp')) || 0;
        let nivel = parseInt(localStorage.getItem('nivel')) || 1;
        let balance = parseFloat(localStorage.getItem('balance')) || 0;
        let racha = parseInt(localStorage.getItem('racha')) || 0;
        let misiones = JSON.parse(localStorage.getItem('misiones')) || [];
        let historial = JSON.parse(localStorage.getItem('historial')) || [0];
        let chart;

        function solicitarPermisosYEmpezar() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        enviarNotificacion("⚔️ Sistema Activo", "¡Te avisaré cuando tengas misiones pendientes!");
                    }
                });
            }
            iniciarApp();
        }

        function iniciarApp() {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            renderizarMisiones();
            actualizarInterfaz();
            inicializarGrafica();
            
            // Recordatorio automático cada 4 horas (si la app está abierta)
            setInterval(() => {
                if(misiones.length > 0) {
                    enviarNotificacion("⚠️ Misiones Pendientes", `Tienes ${misiones.length} retos esperando.`);
                }
            }, 1000 * 60 * 60 * 4);
        }

        function enviarNotificacion(titulo, cuerpo) {
            if (Notification.permission === "granted") {
                new Notification(titulo, { body: cuerpo, icon: "https://cdn-icons-png.flaticon.com/512/616/616490.png" });
            }
        }

        function agregarMision() {
            const input = document.getElementById('nueva-tarea');
            if (input.value.trim() === "") return;
            const nueva = { id: Date.now(), texto: input.value, xp: 20, oro: 5 };
            misiones.push(nueva);
            localStorage.setItem('misiones', JSON.stringify(misiones));
            input.value = "";
            renderizarMisiones();
        }

        function completarMision(id, puntosXP, puntosOro) {
            xp += puntosXP;
            balance += puntosOro;
            misiones = misiones.filter(m => m.id !== id);
            historial.push(balance);
            if(historial.length > 10) historial.shift();

            localStorage.setItem('misiones', JSON.stringify(misiones));
            localStorage.setItem('xp', xp);
            localStorage.setItem('balance', balance);
            localStorage.setItem('historial', JSON.stringify(historial));

            if (xp >= 100) { xp -= 100; nivel++; localStorage.setItem('nivel', nivel); }
            
            actualizarInterfaz();
            renderizarMisiones();
            actualizarGrafica();
        }

        function inicializarGrafica() {
            const ctx = document.getElementById('graficaAhorro').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: historial.map((_, i) => i),
                    datasets: [{
                        data: historial,
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        pointRadius: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function actualizarGrafica() {
            chart.data.labels = historial.map((_, i) => i);
            chart.data.datasets[0].data = historial;
            chart.update();
        }

        function renderizarMisiones() {
            const lista = document.getElementById('lista-misiones');
            lista.innerHTML = misiones.length === 0 ? `<p class="text-center text-gray-600 text-xs py-10">No hay misiones. ¡Crea una nueva! ✨</p>` : "";
            misiones.forEach(m => {
                lista.innerHTML += `
                    <div class="card-mission p-5 rounded-3xl flex justify-between items-center border border-gray-800 shadow-lg">
                        <div>
                            <p class="text-sm font-bold">${m.texto}</p>
                            <p class="text-[9px] text-blue-500">+${m.xp} XP | +${m.oro} ORO</p>
                        </div>
                        <button onclick="completarMision(${m.id}, ${m.xp}, ${m.oro})" class="bg-blue-600/10 text-blue-400 border border-blue-600 px-4 py-2 rounded-xl text-[10px] font-bold active:scale-90 transition-all">LOGRADO</button>
                    </div>
                `;
            });
        }

        function actualizarInterfaz() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('lvl').innerText = nivel;
            document.getElementById('racha').innerText = racha;
        }
    </script>
</body>
</html>
