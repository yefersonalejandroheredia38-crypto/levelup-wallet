<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Business Control v27 🌍</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #010103; color: #fff; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 24px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .active-tab { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        input, select { background: rgba(20, 20, 35, 0.8) !important; border: 1px solid #3b82f644 !important; color: #fff !important; padding: 12px; border-radius: 12px; font-size: 10px; width: 100%; margin-bottom: 10px; }
        .btn-action { background: linear-gradient(135deg, #1e40af, #7e22ce); padding: 15px; border-radius: 15px; font-weight: 800; text-transform: uppercase; font-size: 9px; width: 100%; }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="glass p-4 mb-6 border-dashed border-indigo-500 border">
        <p id="ia-consejo" class="text-[10px] text-indigo-300 italic">"Analizando flujo global..."</p>
    </div>

    <header class="glass p-5 mb-6 border-b-2 border-indigo-600">
        <div class="grid grid-cols-2 gap-4">
            <div><p class="text-[7px] uppercase font-bold text-gray-400">Capital Real</p><p class="text-2xl font-bold">$<span id="ganancia-total">0</span></p></div>
            <div class="text-right"><p class="text-[7px] uppercase font-bold text-red-400">Por Cobrar</p><p class="text-2xl font-bold text-red-400">$<span id="total-deuda">0</span></p></div>
        </div>
    </header>

    <nav class="grid grid-cols-4 gap-2 mb-6">
        <button onclick="tab('misiones')" class="glass p-3 text-[7px] font-bold">📋 ORDENES</button>
        <button onclick="tab('cobranza')" class="glass p-3 text-[7px] font-bold text-red-400">⚖️ COBROS</button>
        <button onclick="tab('boveda')" class="glass p-3 text-[7px] font-bold text-yellow-400">💰 BOVEDA</button>
        <button onclick="tab('clientes')" class="glass p-3 text-[7px] font-bold text-pink-400">👥 AGENDA</button>
        <button onclick="tab('meta')" class="glass p-3 text-[7px] font-bold text-blue-400">🎯 METAS</button>
        <button onclick="tab('espia')" class="glass p-3 text-[7px] font-bold text-cyan-400">🕵️ ESPIA</button>
        <button onclick="tab('more')" class="glass p-3 text-[7px] font-bold text-orange-400">⏰ ALARMAS</button>
        <button onclick="tab('calc')" class="glass p-3 text-[7px] font-bold text-green-400">📊 CALC</button>
    </nav>

    <div id="tab-boveda" class="tab-content">
        <h2 class="text-xs font-bold mb-4 text-yellow-500">HISTORIAL DE GASTOS / SALIDAS</h2>
        <div class="glass p-4 mb-4">
            <input id="gasto-desc" placeholder="Motivo del gasto (Ej: Alquiler, Material)">
            <input id="gasto-monto" type="number" placeholder="Monto $">
            <button onclick="registrarGasto()" class="btn-action bg-yellow-600">Registrar Salida 💸</button>
        </div>
        <div id="lista-gastos" class="space-y-2"></div>
    </div>

    <div id="tab-clientes" class="tab-content">
        <h2 class="text-xs font-bold mb-4 text-pink-500">DIRECTORIO DE CLIENTES</h2>
        <div class="glass p-4 mb-4">
            <input id="cliente-nombre" placeholder="Nombre Completo">
            <input id="cliente-tel" placeholder="WhatsApp (Ej: +58...)">
            <button onclick="addCliente()" class="btn-action">Guardar en Agenda 👥</button>
        </div>
        <div id="lista-clientes" class="space-y-2"></div>
    </div>

    <div id="tab-meta" class="tab-content">
        <h2 class="text-xs font-bold mb-4 text-blue-500">OBJETIVOS DEL MES</h2>
        <div class="glass p-6 text-center">
            <p class="text-[9px] mb-2 text-gray-400">¿CUÁNTO QUIERES GANAR?</p>
            <input id="meta-input" type="number" placeholder="Ej: 5000" class="text-center text-xl">
            <button onclick="setMeta()" class="btn-action">Actualizar Meta 🎯</button>
            <div class="mt-6">
                <p id="meta-status" class="text-[10px]"></p>
                <div class="h-4 bg-white/10 rounded-full mt-2"><div id="meta-bar" class="h-full bg-blue-500 rounded-full w-0 transition-all"></div></div>
            </div>
        </div>
    </div>

    <div id="tab-espia" class="tab-content">
        <h2 class="text-xs font-bold mb-4 text-cyan-500">INTELIGENCIA DE MERCADO</h2>
        <div class="glass p-4 mb-4">
            <input id="espia-negocio" placeholder="Nombre de la Competencia">
            <input id="espia-producto" placeholder="Producto que venden">
            <input id="espia-precio" type="number" placeholder="Su precio $">
            <button onclick="addEspia()" class="btn-action bg-cyan-700">Guardar Dato 🕵️</button>
        </div>
        <div id="lista-espia" class="space-y-2 text-[9px]"></div>
    </div>

    <div id="tab-more" class="tab-content">
        <h2 class="text-xs font-bold mb-4 text-orange-500">RECORDATORIOS DE ENTREGA</h2>
        <div class="glass p-4 mb-4 text-center">
            <p class="text-[9px] text-gray-400 mb-4 italic text-left">Nota: Esto ayuda a organizar tus tiempos de producción.</p>
            <input id="alarma-nota" placeholder="¿Qué hay que entregar?">
            <input id="alarma-hora" type="time">
            <button onclick="setAlarma()" class="btn-action bg-orange-600">Programar Entrega ⏰</button>
        </div>
        <div id="lista-alarmas" class="space-y-2"></div>
    </div>

    <div id="tab-misiones" class="tab-content active-tab"><div id="lista-misiones" class="space-y-2"></div><div class="glass p-4 mt-4"><input id="new-mision" placeholder="Nueva Orden..."><button onclick="addMision()" class="btn-action">Crear 🛠️</button></div></div>
    <div id="tab-cobranza" class="tab-content"><div id="lista-cobranza" class="space-y-2"></div></div>
    <div id="tab-calc" class="tab-content"> </div>

    <script>
        let data = JSON.parse(localStorage.getItem('biz-global-v27')) || {
            ganancia: 0, meta: 1000,
            misiones: [], deudas: [], gastos: [], clientes: [], espia: [], alarmas: []
        };

        window.onload = () => { renderAll(); updateUI(); runIA(); };

        function save() { localStorage.setItem('biz-global-v27', JSON.stringify(data)); }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.getElementById('tab-' + t).classList.add('active-tab');
        }

        // FUNCIONES ACTIVADAS
        function registrarGasto() {
            const d = document.getElementById('gasto-desc').value;
            const m = parseFloat(document.getElementById('gasto-monto').value);
            if(!d || isNaN(m)) return;
            data.ganancia -= m;
            data.gastos.unshift({desc: d, monto: m, fecha: new Date().toLocaleDateString()});
            save(); renderAll(); updateUI();
        }

        function addCliente() {
            const n = document.getElementById('cliente-nombre').value;
            const t = document.getElementById('cliente-tel').value;
            if(!n || !t) return;
            data.clientes.push({nombre: n, tel: t});
            save(); renderAll();
        }

        function setMeta() {
            const m = parseFloat(document.getElementById('meta-input').value);
            if(isNaN(m)) return;
            data.meta = m;
            save(); updateUI();
        }

        function addEspia() {
            const n = document.getElementById('espia-negocio').value;
            const p = document.getElementById('espia-producto').value;
            const pr = document.getElementById('espia-precio').value;
            if(!n || !p || !pr) return;
            data.espia.push({negocio: n, prod: p, precio: pr});
            save(); renderAll();
        }

        function setAlarma() {
            const n = document.getElementById('alarma-nota').value;
            const h = document.getElementById('alarma-hora').value;
            if(!n || !h) return;
            data.alarmas.push({nota: n, hora: h});
            save(); renderAll();
        }

        function renderAll() {
            // Render Gastos
            document.getElementById('lista-gastos').innerHTML = data.gastos.map(g => `<div class="glass p-3 flex justify-between text-[10px]"><span>${g.desc}</span><span class="text-red-400">-$${g.monto}</span></div>`).join('');
            // Render Clientes
            document.getElementById('lista-clientes').innerHTML = data.clientes.map(c => `<div class="glass p-3 flex justify-between text-[10px]"><span>${c.nombre}</span><a href="https://wa.me/${c.tel}" class="text-green-400 font-bold font-bold uppercase">WhatsApp 📱</a></div>`).join('');
            // Render Espia
            document.getElementById('lista-espia').innerHTML = data.espia.map(e => `<div class="glass p-3 italic">${e.negocio} vende ${e.prod} a <b class="text-white">$${e.precio}</b></div>`).join('');
            // Render Alarmas
            document.getElementById('lista-alarmas').innerHTML = data.alarmas.map(a => `<div class="glass p-3 flex justify-between text-[10px]"><span>🔔 ${a.nota}</span><span class="text-orange-400">${a.hora}</span></div>`).join('');
            
            // Render Cobranza y Misiones (basados en v26)
            document.getElementById('lista-misiones').innerHTML = data.misiones.map(m => `<div class="glass p-4 flex justify-between items-center"><span class="text-[10px] uppercase">${m.texto}</span><button onclick="pasarACobranza(${m.id})" class="bg-red-700 px-2 py-1 rounded text-[7px]">COBRAR</button></div>`).join('');
            document.getElementById('lista-cobranza').innerHTML = data.deudas.map(d => `<div class="glass p-4 border-l-4 border-red-500 mb-2 flex justify-between items-center"><span class="text-[10px]">${d.cliente}</span><span class="font-bold">$${d.monto}</span></div>`).join('');
        }

        function updateUI() {
            document.getElementById('ganancia-total').innerText = data.ganancia.toFixed(2);
            document.getElementById('total-deuda').innerText = data.deudas.reduce((a,b)=>a+b.monto,0).toFixed(2);
            const p = (data.ganancia / data.meta) * 100;
            document.getElementById('meta-bar').style.width = Math.min(p, 100) + "%";
            document.getElementById('meta-status').innerText = `Progreso: ${p.toFixed(1)}% de la meta ($${data.meta})`;
        }

        function runIA() {
            const ia = document.getElementById('ia-consejo');
            if(data.deudas.length > 0) ia.innerText = "🚨 ALERTA: Hay cobros pendientes. Tu flujo de caja depende de liquidar esas deudas hoy.";
            else if(data.ganancia < (data.meta * 0.2)) ia.innerText = "💡 CONSEJO: Estás lejos de la meta mensual. Considera lanzar una promoción o revisar tus precios en el Espía.";
            else ia.innerText = "✅ Todo bajo control. Buen ritmo de trabajo.";
        }

        // Funciones básicas de misiones
        function addMision() {
            const v = document.getElementById('new-mision').value; if(!v) return;
            data.misiones.push({id: Date.now(), texto: v});
            document.getElementById('new-mision').value = ""; save(); renderAll();
        }

        function pasarACobranza(id) {
            const cli = prompt("Cliente:"); if(!cli) return;
            const mon = parseFloat(prompt("Monto: $")); if(isNaN(mon)) return;
            data.deudas.push({id: Date.now(), cliente: cli, monto: mon});
            data.misiones = data.misiones.filter(x=>x.id!==id);
            save(); updateUI(); renderAll(); runIA();
        }
    </script>
</body>
</html>
