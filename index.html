<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Hero RPG 🛡️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Press Start 2P', cursive; background: #0a0a0a; color: #fff; font-size: 8px; }
        .pixel-border { border: 4px solid #fff; border-style: outset; background: #1a1a1a; }
        .stat-bar { height: 12px; border: 2px solid #000; transition: width 0.5s; }
        .btn-pixel { background: #3b82f6; border-bottom: 4px solid #1e3a8a; padding: 10px; cursor: pointer; }
        .btn-pixel:active { border-bottom: 0; margin-top: 4px; }
        .avatar-box { width: 80px; height: 80px; image-rendering: pixelated; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="pixel-border p-4 mb-4 flex gap-4 items-center">
        <div id="avatar" class="avatar-box bg-blue-900 flex items-center justify-center text-4xl border-4 border-white">
            👤
        </div>
        <div class="flex-1">
            <p id="p-name" class="mb-2 text-blue-400">HEROE</p>
            <p class="mb-1">LVL: <span id="lvl">1</span></p>
            <div class="w-full bg-gray-800 h-2 mb-2"><div id="xp-bar" class="bg-blue-400 h-full" style="width: 0%"></div></div>
            <p class="text-yellow-400">ORO: <span id="oro">0</span>💰</p>
        </div>
    </header>

    <div class="pixel-border p-3 mb-4 grid grid-cols-2 gap-4">
        <div>
            <p class="mb-1 text-cyan-400">SED 💧</p>
            <div class="stat-bar bg-gray-900"><div id="bar-sed" class="bg-cyan-500 h-full" style="width: 100%"></div></div>
        </div>
        <div>
            <p class="mb-1 text-orange-400">HAMBRE 🍖</p>
            <div class="stat-bar bg-gray-900"><div id="bar-hambre" class="bg-orange-500 h-full" style="width: 100%"></div></div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-6">
        <button onclick="cuidar('agua')" class="btn-pixel text-[6px] bg-blue-700">BEBER AGUA 🥤</button>
        <button onclick="cuidar('comida')" class="btn-pixel text-[6px] bg-orange-700">COMER ALGO 🍎</button>
    </div>

    <nav class="flex gap-2 mb-4">
        <button onclick="tab('quests')" class="bg-gray-700 p-2 flex-1">MISIÓN</button>
        <button onclick="tab('shop')" class="bg-gray-700 p-2 flex-1">TIENDA</button>
    </nav>

    <div id="tab-quests" class="tab-content">
        <h2 class="text-blue-300 mb-4">MISIONES SECUNDARIAS ⚔️</h2>
        <div id="lista-secundarias" class="space-y-2 mb-6">
            <div class="pixel-border p-2 flex justify-between items-center bg-gray-800">
                <span>TAREA 5 MIN</span>
                <button onclick="ganar(10, 2)" class="bg-green-600 p-1 text-[5px]">OK</button>
            </div>
        </div>
        <input id="new-q" type="text" placeholder="Nueva misión..." class="w-full bg-gray-900 p-2 mb-2 border-2 border-gray-700 outline-none">
        <button onclick="addQ()" class="w-full btn-pixel bg-blue-600 mb-4 font-bold">AÑADIR RETO +</button>
    </div>

    <div id="tab-shop" class="tab-content hidden">
        <h2 class="text-yellow-400 mb-4">TIENDA DE ARMADURA 🛡️</h2>
        <div class="space-y-3">
            <div class="pixel-border p-2 flex justify-between items-center">
                <span>CASCO HIERRO</span>
                <button onclick="comprar('🪖', 50)" class="bg-yellow-600 p-1">50💰</button>
            </div>
            <div class="pixel-border p-2 flex justify-between items-center">
                <span>ESCUDO LUZ</span>
                <button onclick="comprar('🛡️', 100)" class="bg-yellow-600 p-1">100💰</button>
            </div>
            <div class="pixel-border p-2 flex justify-between items-center">
                <span>ESPADA FUEGO</span>
                <button onclick="comprar('🔥', 200)" class="bg-yellow-600 p-1">200💰</button>
            </div>
        </div>
        <div id="inventario" class="mt-4 text-gray-500">EQUIPADO: Ninguno</div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('hero-data')) || {
            lvl: 1, xp: 0, oro: 0, sed: 100, hambre: 100, equipo: [], items: ""
        };

        // Reducción automática de supervivencia cada 30 min (simulado más rápido para prueba)
        setInterval(() => {
            state.sed = Math.max(0, state.sed - 1);
            state.hambre = Math.max(0, state.hambre - 0.5);
            updateUI();
        }, 60000); 

        function updateUI() {
            document.getElementById('lvl').innerText = state.lvl;
            document.getElementById('oro').innerText = state.oro;
            document.getElementById('xp-bar').style.width = state.xp + "%";
            document.getElementById('bar-sed').style.width = state.sed + "%";
            document.getElementById('bar-hambre').style.width = state.hambre + "%";
            document.getElementById('avatar').innerText = state.sed < 20 ? "😵" : (state.items || "👤");
            if(state.sed < 10) document.getElementById('avatar').classList.add('bg-red-900');
            else document.getElementById('avatar').classList.remove('bg-red-900');
            localStorage.setItem('hero-data', JSON.stringify(state));
        }

        function cuidar(tipo) {
            if(tipo === 'agua') state.sed = Math.min(100, state.sed + 30);
            if(tipo === 'comida') state.hambre = Math.min(100, state.hambre + 40);
            updateUI();
        }

        function ganar(xp, oro) {
            state.xp += xp;
            state.oro += oro;
            if(state.xp >= 100) { state.xp = 0; state.lvl++; alert("¡LEVEL UP! ✨"); }
            updateUI();
        }

        function comprar(emoji, precio) {
            if(state.oro >= precio) {
                state.oro -= precio;
                state.items = emoji;
                document.getElementById('inventario').innerText = "EQUIPADO: " + emoji;
                updateUI();
            } else { alert("¡No tienes suficiente oro!"); }
        }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById('tab-' + t).classList.remove('hidden');
        }

        function addQ() {
            const val = document.getElementById('new-q').value;
            if(!val) return;
            const div = document.createElement('div');
            div.className = "pixel-border p-2 flex justify-between items-center bg-gray-800 mb-2";
            div.innerHTML = `<span>${val}</span><button onclick="this.parentElement.remove(); ganar(25, 10)" class="bg-green-600 p-1 text-[5px]">OK</button>`;
            document.getElementById('lista-secundarias').appendChild(div);
            document.getElementById('new-q').value = "";
        }

        updateUI();
    </script>
</body>
</html>
